# Render.com "Blueprint" deploy config for DSLand -- OPTIONAL, for a
# permanent public URL (unlike the temporary localtunnel/cloudflared tunnel
# documented in README.md / PROGRESS.md). Not applied automatically: Claude
# never creates third-party accounts on dima's behalf. To use this, dima
# signs up at render.com himself, then either:
#   (a) "New +" -> "Blueprint" -> connect the repo containing this file, or
#   (b) "New +" -> "Web Service" -> connect the repo, and set the fields
#       below manually in the dashboard instead of using this file.
# Full step-by-step is in README.md "Деплой поза локальною мережею".

services:
  - type: web
    name: dsland
    runtime: node
    plan: free
    rootDir: app
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PASSWORD
        sync: false   # set this in the Render dashboard, not in git
      - key: SESSION_SECRET
        sync: false   # set this in the Render dashboard, not in git
      # Optional (2026-07-22) -- without these, players.json/accounts.json/
      # activity.json/usedThemes.json get wiped every time this free-plan
      # service redeploys or spins down from inactivity, because the free
      # plan has no persistent disk and those 4 files are gitignored runtime
      # state. Leaving both blank is fine (the app just runs local-files-only,
      # same as before this existed) -- but see README.md "Чому зникають
      # акаунти на Render" for the 5-minute free fix (a free Upstash Redis
      # database, no credit card needed).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
